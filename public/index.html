<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botanika - Akıllı Bitki Bakım Sistemi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="#"><i class="fa-solid fa-leaf me-2 text-warning"></i>Botanika</a>
            <div class="d-flex align-items-center">
                <span id="welcomeText" class="text-white me-3 d-none">
                    <i class="fa-solid fa-user-circle me-1"></i> Hoş geldin, <b id="usernameSpan" class="text-warning"></b>
                </span>
                <button id="logoutBtn" class="btn btn-outline-light btn-sm rounded-pill d-none">
                    <i class="fa-solid fa-right-from-bracket me-1"></i>Çıkış Yap
                </button>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div id="authPanel" class="row justify-content-center my-5">
            <div class="col-md-5">
                <div class="card shadow-lg border-0 p-4">
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-seedling fa-3x text-success mb-2"></i>
                        <h3 class="fw-bold text-success" id="authTitle">Hesabına Giriş Yap</h3>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary">Kullanıcı Adı</label>
                        <div class="input-group shadow-sm rounded">
                            <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-user text-success"></i></span>
                            <input type="text" id="authUsername" class="form-control border-start-0" placeholder="Örn: zeynep">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Şifre</label>
                        <div class="input-group shadow-sm rounded">
                            <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-lock text-success"></i></span>
                            <input type="password" id="authPassword" class="form-control border-start-0" placeholder="••••••••">
                        </div>
                    </div>

                    <button id="mainAuthBtn" class="btn btn-success w-100 fw-bold py-2 shadow rounded-pill">Giriş Yap</button>
                    <p class="text-center text-muted small mt-3 mb-0" id="toggleAuthText">
                        Hesabın yok mu? <a href="#" id="switchAuthLink" class="text-success fw-bold text-decoration-none">Şimdi Kayıt Ol</a>
                    </p>
                </div>
            </div>
        </div>

        <div id="mainPanel" class="d-none">
            <div class="row mb-4 align-items-center bg-white p-4 rounded-4 shadow-sm">
                <div class="col-md-6">
                    <h2 class="fw-bold text-dark m-0 d-flex align-items-center">
                        Benim Bitkilerim 
                        <span class="badge bg-success rounded-pill ms-2 fs-6" id="plantCount">0</span>
                    </h2>
                </div>
                <div class="col-md-6 text-md-end mt-3 mt-md-0">
                    <button class="btn btn-success fw-bold shadow rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#addPlantModal">
                        <i class="fa-solid fa-plus me-2"></i> Yeni Bitki Ekle
                    </button>
                </div>
            </div>

            <div class="row g-3 mb-4 text-center">
                <div class="col-6 col-md-4">
                    <div class="card bg-white border-0 shadow-sm p-3">
                        <div class="text-muted small fw-bold text-uppercase">Toplam Bitki</div>
                        <div class="fs-3 fw-bold text-success" id="dashTotal">0</div>
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="card bg-white border-0 shadow-sm p-3">
                        <div class="text-muted small fw-bold">🔴 Acil Sulama</div>
                        <div class="fs-3 fw-bold text-danger" id="dashAcil">0</div>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="card bg-white border-0 shadow-sm p-3">
                        <div class="text-muted small fw-bold">🟢 Sağlık Durumu İyi</div>
                        <div class="fs-3 fw-bold text-success" id="dashSaglikli">0</div>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2 mb-4 overflow-x-auto pb-2">
                <button class="btn btn-success btn-sm rounded-pill px-4 filter-btn active" data-filter="Tümü">Tümü</button>
                <button class="btn btn-outline-danger btn-sm rounded-pill px-4 filter-btn" data-filter="Acil"><i class="fa-solid fa-triangle-exclamation me-1"></i>Acil Sulama</button>
               <button class="btn btn-outline-warning btn-sm rounded-pill px-4 filter-btn" data-filter="Yaklaşanlar">
    <i class="fa-solid fa-clock me-1"></i>Yaklaşanlar
</button>
                <button class="btn btn-outline-success btn-sm rounded-pill px-4 filter-btn" data-filter="Saglikli"><i class="fa-solid fa-circle-check me-1"></i>Sağlıklı</button>
            </div>

            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="plantsContainer">
                </div>
        </div>
    </div>

    <div class="modal fade" id="addPlantModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title fw-bold"><i class="fa-solid fa-seedling me-2"></i>Yeni Bitki Kaydı</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="plantForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Bitki Adı *</label>
                                <input type="text" id="pIsim" class="form-control" required placeholder="Örn: Paşa Kılıcı" maxlength="25">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Türü *</label>
                                <input type="text" id="pTur" class="form-control" required placeholder="Örn: Sansevieria" maxlength="25">
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Kısa Açıklama</label>
                                <input type="text" id="pAciklama" class="form-control" placeholder="Oturma odasındaki büyük saksı" maxlength="40" >
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Sulama Periyodu (Gün) *</label>
<input type="number" id="pPeriyot" class="form-control" required min="1" max="365" placeholder="Örn: 7">
                            </div>
                            <div class="col-md-6">
                             <label class="form-label small fw-bold">Son Sulama Tarihi *</label>
<input type="date" id="pSonTarih" class="form-control" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold py-2 rounded-pill mt-4 shadow">Sisteme Kaydet</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js?v=3"></script>

    <div class="modal fade" id="historyModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-dark text-white">
                <h6 class="modal-title fw-bold"><i class="fa-solid fa-clock-rotate-left me-2"></i>Sulama Geçmişi</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-3">
                <ul class="list-group list-group-flush small" id="historyList">
                    </ul>
            </div>
        </div>
    </div>
</div>

</body>
</html>
